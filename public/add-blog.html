<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog</title>
</head>
<body>

    <header>

        <h1>Simple Blog Manager</h1>

        <nav>
            <a href="index.html">Home</a> |
            <a href="add-blog.html">Add Blog</a>
        </nav>

        <hr>

    </header>

    <main>

        <h2>Add Blog</h2>

        <form action="/add-blog" method="POST">

            <label>Blog Title</label>
            <br>
            <input type="text" id="title" name="title" placeholder="Enter blog title" required>
            <br><br>

            <label>Blog Content</label>
            <br>

            <textarea id="content" name="content" rows="8" cols="50"
            placeholder="Write your blog here"></textarea>

            <br><br>

            <button type="submit">
                Submit
            </button>

        </form>

    </main>

    <hr>

    <footer>
        <p>© 2026 Simple Blog Manager | Codomax Internship Project</p>
    </footer>
    <script src="script.js"></script>

</body>
</html>
